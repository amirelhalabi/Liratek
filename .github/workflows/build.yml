name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 1.0.0)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install: "true"

      - name: Run tests
        run: yarn test

  # Pre-create a draft release so all build jobs can upload to it
  # without race conditions (electron-builder finds the existing draft)
  create-draft:
    name: Create Draft Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(node -p "require('./package.json').version")
            fi
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Check if release already exists
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists, ensuring it is a draft"
            gh release edit "$TAG" --draft
          else
            echo "Creating draft release $TAG"
            gh release create "$TAG" \
              --draft \
              --title "LiraTek $TAG" \
              --generate-notes \
              --target "${{ github.sha }}"
          fi

  build-windows:
    name: Build Windows
    needs: create-draft
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ./.github/actions/setup
        with:
          install: "true"

      - name: Inject update token
        run: node scripts/inject-update-token.cjs
        env:
          UPDATE_TOKEN: ${{ secrets.UPDATE_TOKEN }}

      - name: Build application
        run: yarn build

      - name: Build & Publish Windows Installer
        run: yarn ci:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    name: Publish Release
    needs: [create-draft, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Undraft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.create-draft.outputs.tag }}"
          echo "Publishing release $TAG"
          gh release edit "$TAG" --draft=false
